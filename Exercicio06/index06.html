<!-- 6) Etiqueta sobre imagem
Colocar uma tag em cima da imagem.
Regras
Imagem de produto
Selo “-50%” em cima da imagem -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style06.css" />

    <title>Etiqueta sobre imagem</title>
</head>

<body>
    <div class="produto-container">
        <img src="https://fujiokadistribuidor.vteximg.com.br/arquivos/ids/278670" alt="Fone de Ouvido" class="produto-imagem">
        <p>Fone de Ouvido Sony WH-CH510 Bluetooth Preto</p>
        <div class="tag-desconto">-50%</div>

        <button class="botao-comprar">Comprar</button>

    </div>

</body>

</html>
