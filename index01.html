<!-- 1 Cartão com selo no canto
Criar um card e colocar um selo no canto superior direito.
Regras
Card com imagem, título e texto
Um selo “NOVO” ou “PROMO”
O selo deve ficar no canto do card -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style01.css" />
    <title>Cartão com selo no canto</title>
</head>

<body>

    <article class="card">

        <span class="selo-tag">NOVA</span>

        <img src="https://www.gov.br/governodigital/pt-br/imagens/banner-cin-novo.png" alt="Imagem da Nova Identidade Nacional" class="card-image" />

        <div class="card-conteudo">
            <h2 class="card-titulo">Nova Carteira de Identidade Nacional</h2>
            <p class="card-descricao">Faça já a sua Nova Identidade Nacional: a CIN!</p>
        </div>

    </article>

</body>

</html>
